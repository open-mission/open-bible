name: Desktop Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-24.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      
      - name: Configure pnpm
        run: pnpm config set fetch-timeout 120000

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # better-sqlite3 is a dev-only native module (used only by server import
      # scripts) and is NOT imported by the desktop build. Its node-gyp postinstall
      # is the only step that fails on Windows runners. --ignore-scripts skips
      # native postinstall builds — safe here because the Tauri/Rust side compiles
      # with its own toolchain and the Next.js static export needs no native Node
      # modules.
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build and release desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUILD: "1"
          NEXT_PUBLIC_API_ORIGIN: "https://openbible-prod.vercel.app"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Open Bible ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
