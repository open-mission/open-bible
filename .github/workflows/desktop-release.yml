name: Desktop Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-24.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Configure pnpm
        run: pnpm config set fetch-timeout 120000

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # better-sqlite3 is a dev-only native module (used only by server import
      # scripts) and is NOT imported by the desktop build. Its node-gyp postinstall
      # is the only step that fails on Windows runners. --ignore-scripts skips
      # native postinstall builds — safe here because the Tauri/Rust side compiles
      # with its own toolchain and the Next.js static export needs no native Node
      # modules.
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify and prepare TAURI signing key
        shell: bash
        run: |
          set -euo pipefail
          KEY_VAL="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          if [ -z "$KEY_VAL" ]; then
            echo "Error: TAURI_SIGNING_PRIVATE_KEY secret is not set!"
            exit 1
          fi
          
          mkdir -p src-tauri
          
          # Check if the secret is base64-encoded or raw
          if echo "$KEY_VAL" | grep -q "^untrusted comment:"; then
            echo "TAURI_SIGNING_PRIVATE_KEY is stored as raw text."
            echo "$KEY_VAL" > src-tauri/tauri-signing.key
          else
            echo "TAURI_SIGNING_PRIVATE_KEY is base64-encoded. Decoding..."
            # Clean base64 value of any whitespace/newlines before decoding
            CLEANED_B64=$(echo "$KEY_VAL" | tr -d '\r\n ')
            echo "$CLEANED_B64" | base64 --decode > src-tauri/tauri-signing.key
          fi
          
          # Verify that the generated key file starts with the correct header
          FIRST_LINE=$(head -n 1 src-tauri/tauri-signing.key)
          if [[ "$FIRST_LINE" =~ ^untrusted\ comment: ]]; then
            echo "Success: Prepared signing key starts with valid header: '$FIRST_LINE'"
          else
            echo "Error: Decoded key does not start with 'untrusted comment:'! First line: '$FIRST_LINE'"
            rm -f src-tauri/tauri-signing.key
            exit 1
          fi

      - name: Build and release desktop app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUILD: "1"
          NEXT_PUBLIC_APP_ENV: "production"
          NEXT_PUBLIC_API_ORIGIN: "https://openbible-prod.vercel.app"
          TAURI_SIGNING_PRIVATE_KEY: ${{ github.workspace }}/src-tauri/tauri-signing.key
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Open Bible ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Clean up signing key
        if: always()
        run: rm -f src-tauri/tauri-signing.key
